<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Administrasi Guru (Offline)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); background-attachment: fixed; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* FIX SCROLL & STICKY HEADER */
        .table-container { 
            max-height: 75vh; 
            overflow: auto; 
            position: relative; 
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            background: white;
        }

        /* Sticky Table Styles */
        .sticky-table thead tr:nth-child(1) th { position: sticky; top: 0; z-index: 100; background-color: #0f172a !important; color: white; }
        .sticky-table thead tr:nth-child(2) th { position: sticky; top: 38px; z-index: 90; background-color: #1e293b !important; color: white; }
        .sticky-col { position: sticky; z-index: 40; background: white !important; border-right: 2px solid #cbd5e1; }
        .sticky-header-col { z-index: 110 !important; background-color: #0f172a !important; color: white !important; }

        .w-no { min-width: 50px; } .w-kode { min-width: 90px; } .w-bab { min-width: 160px; }
        .w-atp { min-width: 450px; } .w-jp { min-width: 60px; } .w-sem { min-width: 60px; }
        .w-date { min-width: 45px; }

        .adm-table td { border: 1px solid #cbd5e1; padding: 0; vertical-align: top; }
        .adm-table input, .adm-table textarea { width: 100%; background: transparent; outline: none; border: none; padding: 10px; font-weight: 600; font-size: 11px; color: #000; }
        .adm-table textarea { resize: none; overflow: hidden; min-height: 45px; line-height: 1.5; }
        
        .check-cell { text-align: center; vertical-align: middle !important; background-color: #f8fafc; }
        .check-cell input { width: 22px; height: 22px; cursor: pointer; accent-color: #4f46e5; }
        
        .is-holiday { background-color: #fee2e2 !important; color: #b91c1c; border: 1px solid #f87171 !important; }
        .is-partial { background-color: #fef3c7 !important; color: #92400e; border: 1px solid #fbbf24 !important; }

        /* --- PRINT STYLES --- */
        .no-print { display: block; }
        
        @media print {
            * { font-family: 'Times New Roman', serif !important; color: black !important; }
            body > *:not(#print-area) { display: none !important; }
            #print-area { 
                display: block !important; 
                position: absolute; 
                top: 0; left: 0; width: 100%; 
                padding: 20px; background: white; z-index: 9999; 
            }
            .gradient-bg { background: white !important; }

            /* Dynamic Styles for PDF */
            table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 10pt; }
            th, td { border: 1px solid black !important; padding: 6px; vertical-align: top; white-space: normal; word-wrap: break-word;}
            th { background-color: #f0f0f0 !important; text-align: center; font-weight: bold; -webkit-print-color-adjust: exact; }
            .text-center { text-align: center !important; }
            .font-bold { font-weight: bold !important; }
            .uppercase { text-transform: uppercase !important; }
            
            /* Fix Promes columns width for print */
            .w-atp { min-width: 200px; } /* Adjust width for print paper */
            .w-date { min-width: 30px; }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen p-4 md:p-8 text-gray-800">

    <script>
        let dataJadwal = { 'Senin':['PAI','B. Indonesia','Literasi'],'Selasa':['Matematika','IPA','B. Inggris'],'Rabu':['IPA','SBdP','B. Indonesia'],'Kamis':['Matematika','B. Indonesia','PJOK'],'Jumat':['Pramuka','Literasi','PAI']};
        let pengecualian = {}; let dataProta = {}; let dataPromes = {}; 
        let curMapel = ""; let curMode = "";

        const DB_KEY = 'admGuruData_v4';

        window.onload = function() {
            setTimeout(() => {
                const savedData = localStorage.getItem(DB_KEY);
                if(savedData) {
                    try {
                        const p = JSON.parse(savedData);
                        dataJadwal = p.jadwal || dataJadwal;
                        pengecualian = p.pengecualian || {};
                        dataProta = p.prota || {};
                        dataPromes = p.promes || {};
                        document.getElementById('input-nama-setup').value = p.profil?.nama || "";
                        document.getElementById('input-kelas-setup').value = p.profil?.kelas || "";
                        document.getElementById('input-kepsek-setup').value = p.profil?.kepsek || "";
                        if(p.profil?.nama) navigasi('dashboard'); else navigasi('setup');
                    } catch(e) { navigasi('setup'); }
                } else { navigasi('setup'); }
                document.getElementById('loading-overlay').classList.add('hidden');
            }, 500);
        };

        function navigasi(page) {
            document.querySelectorAll('body > div[id]').forEach(div => div.classList.add('hidden'));
            if(page === 'dashboard') {
                document.getElementById('display-nama').innerText = document.getElementById('input-nama-setup').value || "Pengajar";
                document.getElementById('display-kelas').innerText = document.getElementById('input-kelas-setup').value || "Kelas";
                document.getElementById('dashboard-page').classList.remove('hidden');
            } else if(page === 'jadwal') { renderJadwal(); document.getElementById('jadwal-page').classList.remove('hidden'); }
            else if(page === 'kalender') { initKalender(); document.getElementById('kalender-page').classList.remove('hidden'); }
            else if(page === 'prota' || page === 'promes') { curMode = page; renderMapelList(page); document.getElementById('pro-list-page').classList.remove('hidden'); }
            else { document.getElementById(page + '-page').classList.remove('hidden'); }
        }

        function paksaSimpan() {
            const p = { 
                profil: { 
                    nama: document.getElementById('input-nama-setup').value, 
                    kelas: document.getElementById('input-kelas-setup').value,
                    kepsek: document.getElementById('input-kepsek-setup').value
                }, 
                jadwal: dataJadwal, 
                pengecualian: pengecualian, 
                prota: dataProta, 
                promes: dataPromes 
            };
            document.getElementById('loading-overlay').classList.remove('hidden');
            localStorage.setItem(DB_KEY, JSON.stringify(p));
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
                alert("Berhasil disimpan di Local Storage Browser!");
            }, 800);
        }

        function hapusSemuaData() {
            if(confirm("Hapus semua data?")) {
                localStorage.removeItem(DB_KEY);
                location.reload();
            }
        }

        function tutupModal(id) { 
            document.getElementById(id).classList.add('hidden'); 
        }

        // --- EXPORT TO EXCEL FUNCTION ---
        function exportToExcel(tableId, fileName) {
            const table = document.getElementById(tableId);
            const html = table.outerHTML;
            // Replace inputs/textarea with values
            const cleanHtml = html.replace(/<input[^>]*value="([^"]*)"[^>]*>/g, '$1')
                                  .replace(/<textarea[^>]*>(.*?)<\/textarea>/g, '$1')
                                  .replace(/<button[^>]*>×<\/button>/g, '') // Remove delete buttons
                                  .replace(/<input[^>]*type="checkbox"[^>]*>/g, '') // Remove checkboxes for cleaner excel
                                  .replace(/type="checkbox"/g, ''); 

            // Add basic styling for Excel borders
            const style = `<style>
                table { border-collapse: collapse; width: 100%; }
                td, th { border: 1px solid black; padding: 5px; font-family: Arial, sans-serif; font-size: 11px; }
                th { background-color: #f2f2f2; font-weight: bold; text-align: center; }
            </style>`;

            const blob = new Blob(['\ufeff', style + cleanHtml], {
                type: 'application/vnd.ms-excel'
            });

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName + '.xls';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // --- PRINT PROTA / PROMES (PDF) FUNCTION ---
        function printProtaPromes(tableId, title, orientation) {
            const table = document.getElementById(tableId);
            const clone = table.cloneNode(true);
            
            // Clean the table for print (remove inputs/buttons)

        // --- KALENDER & STATISTIK ---
        function initKalender() {
            const sem = document.getElementById('select-semester').value;
            const thn = parseInt(document.getElementById('input-tahun').value);
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            let start = sem === '1' ? 6 : 0;
            for(let i=0; i<6; i++) {
                let m = (start + i) % 12;
                let y = (sem === '1' && start + i >= 12) ? thn + 1 : thn;
                if(sem === '2') y = thn; renderMonth(m, y);
            }
            hitungStatistik();
        }

        function renderMonth(m, y) {
            const mName = new Date(y, m).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            let html = `<div class="glass p-5 rounded-3xl shadow-lg border"><h4 class="text-center font-bold text-indigo-900 mb-4 border-b pb-2 uppercase text-[10px] tracking-widest italic">${mName}</h4><div class="grid grid-cols-7 gap-1 text-[8px] text-center font-black text-gray-400 mb-2 uppercase"><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div><div>Min</div></div><div class="grid grid-cols-7 gap-1.5">`;
            let fDay = new Date(y, m, 1).getDay(); let dInM = new Date(y, m+1, 0).getDate();
            let offset = fDay === 0 ? 6 : fDay - 1;
            for(let x=0; x<offset; x++) html += `<div></div>`;
            for(let d=1; d<=dInM; d++) {
                let dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let dObj = new Date(y, m, d); let isW = (dObj.getDay() === 0 || dObj.getDay() === 6);
                let dayName = dObj.toLocaleDateString('id-ID', { weekday: 'long' });
                let st = ""; if(pengecualian[dStr]) st = pengecualian[dStr].type === 'total' ? 'is-holiday' : 'is-partial';
                html += `<div onclick="bukaModal('${dStr}', '${dayName}', ${isW})" class="day-cell h-8 flex items-center justify-center rounded-xl text-[11px] font-bold ${isW ? 'bg-gray-100 text-gray-300 cursor-default' : 'bg-white shadow-sm'} ${st}">${d}</div>`;
            }
            document.getElementById('calendar-grid').innerHTML += html + `</div></div>`;
        }

        function bukaModal(dStr, dayName, isW) {
            if(isW) return; document.getElementById('modal-date-title').innerText = dStr;
            document.getElementById('modal-day-badge').innerText = dayName;
            const data = pengecualian[dStr] || { type: '', reason: '', mapels: [] };
            document.getElementById('check-libur-total').checked = (data.type === 'total');
            document.getElementById('input-keterangan').value = data.reason || '';
            const lCont = document.getElementById('list-mapel-modal'); lCont.innerHTML = '';
            if(dataJadwal[dayName]) {
                dataJadwal[dayName].forEach(m => {
                    let mapelName = m.trim();
                    let isChecked = data.mapels && data.mapels.includes(mapelName) ? 'checked' : '';
                    lCont.innerHTML += `<label class="flex items-center gap-2 p-2 bg-white rounded-xl border text-[10px] cursor-pointer font-bold"><input type="checkbox" class="check-mapel-item accent-indigo-600 w-4 h-4" value="${mapelName}" ${isChecked}> ${mapelName}</label>`;
                });
            }
            document.getElementById('modal-hari').classList.remove('hidden');
        }

        function simpanStatusHari() {
            let dStr = document.getElementById('modal-date-title').innerText;
            const isTotal = document.getElementById('check-libur-total').checked;
            const selectedMapels = Array.from(document.querySelectorAll('.check-mapel-item:checked')).map(el => el.value);
            const reason = document.getElementById('input-keterangan').value;
            if(isTotal) pengecualian[dStr] = { type: 'total', reason: reason || 'Libur Total', mapels: [] };
            else if(selectedMapels.length > 0) pengecualian[dStr] = { type: 'partial', reason: reason || 'Tidak Efektif', mapels: selectedMapels };
            else delete pengecualian[dStr];
            tutupModal('modal-hari'); initKalender();
        }

        function hitungStatistik() {
            const sem = document.getElementById('select-semester').value; const thn = parseInt(document.getElementById('input-tahun').value);
            let start = sem === '1' ? 6 : 0; let grandT = 0; let hStats = ""; let exHtml = "";
            for(let i=0; i<6; i++) {
                let m = (start + i) % 12; let y = (sem === '1' && start + i >= 12) ? thn + 1 : thn;
                if(sem === '2') y = thn;
                let count = 0; let d = new Date(y, m, 1);
                while(d.getMonth() === m) {
                    let dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    if(d.getDay() !== 0 && d.getDay() !== 6) {
                        if(!pengecualian[dStr] || pengecualian[dStr].type !== 'total') count++;
                        if(pengecualian[dStr]) {
                            let p = pengecualian[dStr]; let dObj = new Date(dStr); let dayN = dObj.toLocaleDateString('id-ID', { weekday: 'long' });
                            let mapelDesc = p.type === 'total' ? 'Semua Mapel' : p.mapels.join(', ');
                            exHtml += `<div class="p-3 bg-white border-l-4 ${p.type === 'total' ? 'border-red-500' : 'border-amber-500'} rounded-2xl shadow-sm text-[10px] font-bold italic mb-2"><div class="text-indigo-600">${dayN}, ${dStr}</div><div class="text-gray-700">${mapelDesc}</div><div class="text-gray-400 font-normal">Ket: ${p.reason}</div></div>`;
                        }
                    }
                    d.setDate(d.getDate()+1);
                }
                grandT += count; hStats += `<div class="p-3 bg-white rounded-xl border flex justify-between font-bold text-[10px] uppercase text-indigo-900 shadow-sm"><span>${new Date(y, m).toLocaleDateString('id-ID',{month:'long'})}</span><span>${count} HARI</span></div>`;
            }
            document.getElementById('stats-bulanan').innerHTML = hStats; document.getElementById('grand-total-semester').innerText = grandT;
            document.getElementById('rekap-list').innerHTML = exHtml || '<p class="text-[10px] text-gray-300 text-center italic py-4">TIDAK ADA PENGECUALIAN</p>';
        }

        // --- PROTA & PROMES ---
        function renderMapelList(mode) {
            const list = document.getElementById('pro-mapel-list-container'); list.innerHTML = '';
            document.getElementById('pro-list-title').innerText = mode === 'prota' ? 'PROTA' : 'PROMES';
            let all = [...new Set(Object.values(dataJadwal).flat().map(m => m.trim()))];
            all.forEach(m => { list.innerHTML += `<div onclick="bukaDetail('${mode}', '${m}')" class="glass p-8 rounded-[2.5rem] shadow-lg cursor-pointer border-l-8 ${mode==='prota'?'border-orange-500':'border-purple-500'} flex justify-between font-bold uppercase italic hover:shadow-2xl transition-all"><span>${m}</span><i class="fa-solid fa-chevron-right text-gray-300"></i></div>`; });

        function bukaDetail(mode, mapel) {
            curMapel = mapel; curMode = mode;
            if(mode === 'prota') { if(!dataProta[mapel]) dataProta[mapel] = [{kode:'', bab:'', atp:'', jp:'', sem:''}]; renderTableProta(); navigasi('prota-detail'); }
            else { if(!dataPromes[mapel]) dataPromes[mapel] = [{kode:'', bab:'', atp:'', jp:'', sem:'', checks:{}}]; renderTablePromes(); navigasi('promes-detail'); }
        }

        function handlePasteProta(e, rIdx) {
            e.preventDefault(); let text = (e.clipboardData || window.clipboardData).getData('Text');
            let rows = text.split(/\r\n|\n|\r/);
            rows.forEach((row, i) => { if(!row.trim()) return; let cols = row.split('\t'); let idx = rIdx + i;
                if(!dataProta[curMapel][idx]) dataProta[curMapel].push({kode:'', bab:'', atp:'', jp:'', sem:''});
                dataProta[curMapel][idx].kode = cols[0] || ""; dataProta[curMapel][idx].bab = cols[1] || ""; dataProta[curMapel][idx].atp = cols[2] || ""; dataProta[curMapel][idx].jp = cols[3] || ""; dataProta[curMapel][idx].sem = cols[4] || "";
            }); renderTableProta();
        }

        function renderTableProta() {
            const body = document.getElementById('prota-table-body'); body.innerHTML = ''; let t = 0;
            dataProta[curMapel].forEach((r, i) => { t += parseFloat(r.jp) || 0;
                body.innerHTML += `<tr><td class="text-center font-bold sticky-col" style="left:0">${i+1}</td><td><input type="text" value="${r.kode}" oninput="dataProta['${curMapel}'][${i}].kode=this.value" onpaste="handlePasteProta(event, ${i})"></td><td><input type="text" value="${r.bab}" oninput="dataProta['${curMapel}'][${i}].bab=this.value"></td><td class="w-atp"><textarea oninput="this.style.height=''; this.style.height=this.scrollHeight+'px'; dataProta['${curMapel}'][${i}].atp=this.value">${r.atp}</textarea></td><td><input type="number" value="${r.jp}" oninput="dataProta['${curMapel}'][${i}].jp=this.value; document.getElementById('prota-total-jp').innerText=hitungTotalJP()"></td><td><input type="text" value="${r.sem}" oninput="dataProta['${curMapel}'][${i}].sem=this.value"></td><td class="text-center"><button onclick="hapusBaris('prota', ${i})" class="text-red-700">×</button></td></tr>`;
            }); document.getElementById('prota-total-jp').innerText = t;
        }

        function tarikDataProta() {
            if(!dataProta[curMapel] || dataProta[curMapel].length === 0) { alert("Isi PROTA dulu!"); return; }
            dataPromes[curMapel] = dataProta[curMapel].map((r, i) => {
                const ex = dataPromes[curMapel] ? dataPromes[curMapel][i] : null;
                return { kode: r.kode, bab: r.bab, atp: r.atp, jp: r.jp, sem: r.sem, checks: ex ? ex.checks : {} };
            }); renderTablePromes();
        }

        function renderTablePromes() {
            const sem = document.getElementById('select-semester').value; const thn = parseInt(document.getElementById('input-tahun').value);
            let start = sem === '1' ? 6 : 0; let dates = [];
            for(let i=0; i<185; i++) {

            let h2 = `<tr class="bg-indigo-900 text-[9px] text-white">`;

                dates.forEach(d => { let c = r.checks[d.dStr] ? 'checked' : ''; row += `<td class="w-date check-cell border-l"><input type="checkbox" ${c} onchange="dataPromes['${curMapel}'][${i}].checks['${d.dStr}']=this.checked"></td>`; });
                body.innerHTML += row + `<td class="text-center"><button onclick="hapusBaris('promes', ${i})" class="text-red-700">×</button></td></tr>`;

        function bukaRekapMapel() {
            let s = {}; Object.values(dataJadwal).flat().forEach(m => s[m.trim()] = 0);
            const sem = document.getElementById('select-semester').value; const thn = parseInt(document.getElementById('input-tahun').value);
            let st = sem === '1' ? 6 : 0;
            for(let i=0; i<185; i++) {
                let d = new Date(thn, st, 1 + i); if(sem === '1' && d.getMonth() > 11 && d.getFullYear() === thn) continue; if(sem === '2' && d.getMonth() > 5) break;
                let dStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                let dName = d.toLocaleDateString('id-ID', { weekday: 'long' });

            if(mode === 'prota') dataProta[curMapel].push({kode:'', bab:'', atp:'', jp:'', sem:''});
            else dataPromes[curMapel].push({kode:'', bab:'', atp:'', jp:'', sem:'', checks:{}});
            mode === 'prota' ? renderTableProta() : renderTablePromes();
        }

        function hapusBaris(mode, i) {
            if(mode === 'prota') dataProta[curMapel].splice(i, 1);
            else dataPromes[curMapel].splice(i, 1);
            mode === 'prota' ? renderTableProta() : renderTablePromes();
        }

        function hitungTotalJP() { let t = 0; if(dataProta[curMapel]) dataProta[curMapel].forEach(r => t += parseFloat(r.jp) || 0); return t; }
    </script>
